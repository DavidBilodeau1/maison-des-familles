# ============================================================
#  Configuration du serveur de photos - Maison des Familles
#  Modifiez les lignes ci-dessous, puis sauvegardez ce fichier.
#  NE modifiez pas les lignes qui commencent par un #
# ============================================================

# Dossier contenant les photos originales
# Exemple Windows : C:\Photos\uploads
# Exemple cle USB  : D:\photos\uploads
UPLOADS_DIR=C:\Photos\uploads

# Dossier ou les photos selectionnees seront copiees
# Exemple Windows : C:\Photos\final_choices
# Exemple cle USB  : D:\photos\final_choices
FINAL_DIR=C:\Photos\final_choices

# Cle secrete — doit etre identique a PHOTOSHOOT_WEBHOOK_SECRET sur DigitalOcean
WEBHOOK_SECRET=changez-moi

# Token du tunnel Cloudflare
# Obtenez-le depuis : https://one.dash.cloudflare.com/
#   Zero Trust > Networks > Tunnels > [votre tunnel] > Configure > Token
CLOUDFLARE_TOKEN=votre-token-cloudflare-ici

# Port local (ne pas modifier sauf si le port 8091 est deja utilise)
PORT=8091
