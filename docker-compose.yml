version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photo_selection_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./photos:/var/www/storage/app/photos
    networks:
      - photo_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: photo_selection_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./photos:/var/www/storage/app/photos
    networks:
      - photo_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: photo_selection_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: photo_selection
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: photo_user
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - photo_network
    ports:
      - "3306:3306"

networks:
  photo_network:
    driver: bridge

volumes:
  dbdata:
    driver: local

